<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Order</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
    <link rel="stylesheet" href="{% static 'css/users.css' %}">
    <link rel="stylesheet" href="{% static 'css/library_pages.css' %}">
</head>
<body>

{% include "partials/navbar.html" %}

<div class="container">
    <div class="page-top">
        <h2>Create Order</h2>
        <a class="secondary-btn" href="{% url 'order:my_orders' %}">Back to my orders</a>
    </div>

    {% if error %}
        <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="post" class="simple-form">
        {% csrf_token %}

        <div class="form-group">
            <label for="book_id">Choose a book</label>
            <select name="book_id" id="book_id">
                <option value="">Select a book</option>
                {% for book in books %}
                    <option value="{{ book.id }}">
                        {{ book.name }} (available: {{ book.count }})
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="primary-btn">Create order</button>
            <a class="secondary-btn" href="{% url 'order:my_orders' %}">Cancel</a>
        </div>
    </form>
</div>

{% include "partials/footer.html" %}

</body>
</html>
